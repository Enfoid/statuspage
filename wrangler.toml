name = "statuspage"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Static files (currently just favicon.ico) served directly by Cloudflare's asset
# routing ahead of the Worker — no route/binding needed for /favicon.ico to work.
[assets]
directory = "./public"

# Runs monitor checks + prunes old check history every minute.
[triggers]
crons = ["*/1 * * * *"]

# Create with: wrangler d1 create statuspage-db
# Then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "statuspage-db"
database_id = "afa707d8-cfdd-448c-9989-ca90f64fc0fe"

# Set with: wrangler secret put ADMIN_TOKEN
# (do not put the real token here)

# Lets the Worker send down/recovered alert emails via Cloudflare Email Routing.
# Sender/recipient addresses are hardcoded in src/email.ts.
[[send_email]]
name = "EMAIL"
